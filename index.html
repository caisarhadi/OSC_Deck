<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camera Control Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/main.js"></script>
</head>

<body class="app-body">

    <!-- Header Removed -->
    <!-- Main Interaction Area -->
    <main id="space-container">

        <!-- OLED Display -->
        <div class="oled-display">
            <div class="oled-label" id="oled-label">CAM.CTRL</div>
            <div class="oled-value" id="oled-value">STANDBY</div>
        </div>

        <!-- Rotary Knobs -->
        <div class="knob-rack">
            <div class="knob-wrap" id="knob-1">
                <div class="knob-reset" title="Reset EI">
                    <div class="knob-reset-inner">
                        <svg class="knob-reset-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="8" fill="currentColor" />
                        </svg>
                    </div>
                </div>
                <div class="knob-track"></div>
                <div class="knob-base">
                    <div class="knob-dial">
                        <div class="knob-indicator"></div>
                    </div>
                </div>
                <div class="knob-label">EI</div>
            </div>
            <div class="knob-wrap" id="knob-2">
                <div class="knob-reset" title="Reset SHUTTER">
                    <div class="knob-reset-inner">
                        <svg class="knob-reset-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="8" fill="currentColor" />
                        </svg>
                    </div>
                </div>
                <div class="knob-track"></div>
                <div class="knob-base">
                    <div class="knob-dial">
                        <div class="knob-indicator"></div>
                    </div>
                </div>
                <div class="knob-label">SHUTTER</div>
            </div>
            <div class="knob-wrap" id="knob-3">
                <div class="knob-reset" title="Reset WB">
                    <div class="knob-reset-inner">
                        <svg class="knob-reset-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="8" fill="currentColor" />
                        </svg>
                    </div>
                </div>
                <div class="knob-track"></div>
                <div class="knob-base">
                    <div class="knob-dial">
                        <div class="knob-indicator"></div>
                    </div>
                </div>
                <div class="knob-label">WB</div>
            </div>
        </div>

        <!-- Vertical Knobs (Left Side) -->
        <div class="knob-rack-vertical">
            <div class="knob-wrap master-knob" id="knob-6">
                <div class="reset-wrap master-reset" title="Reset MASTER RATE">
                    <div class="reset-inner">
                        <svg class="reset-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="4" />
                        </svg>
                    </div>
                </div>
                <div class="knob-track"></div>
                <div class="knob-base">
                    <div class="knob-dial">
                        <div class="master-ticks-container" id="master-knob-center"></div>
                    </div>
                </div>
                <div class="knob-label">MASTER RATE</div>
            </div>
            <div class="knob-wrap" id="knob-4">
                <div class="knob-reset" title="Reset T-RATE">
                    <div class="knob-reset-inner">
                        <svg class="knob-reset-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="8" fill="currentColor" />
                        </svg>
                    </div>
                </div>
                <div class="knob-track"></div>
                <div class="knob-base">
                    <div class="knob-dial">
                        <div class="knob-indicator"></div>
                    </div>
                </div>
                <div class="knob-label">T-RATE</div>
            </div>
            <div class="knob-wrap" id="knob-5">
                <div class="knob-reset" title="Reset R-RATE">
                    <div class="knob-reset-inner">
                        <svg class="knob-reset-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="8" fill="currentColor" />
                        </svg>
                    </div>
                </div>
                <div class="knob-track"></div>
                <div class="knob-base">
                    <div class="knob-dial">
                        <div class="knob-indicator"></div>
                    </div>
                </div>
                <div class="knob-label">R-RATE</div>
            </div>
        </div>

        <!-- Outermost Rotary Ring: Controls Yaw -->
        <div id="yaw-ring"></div>

        <!-- Outer Zone: Controls Heave Z and Roll -->
        <div id="outer-ring">
            <div class="ring-indicator" id="outer-indicator"></div>
        </div>

        <!-- Pan Limit Boundary -->
        <div id="pan-boundary"></div>

        <!-- Reset Button -->
        <div id="reset-btn" class="reset-wrap" title="Reset Camera">
            <div class="reset-inner">
                <svg class="reset-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path
                        d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                </svg>
            </div>
        </div>

        <!-- Vertical Sliders (Right Side) -->
        <div class="vertical-slider-wrap v1">
            <div class="ribbon-slider vertical" id="neumorphic-slider-vertical-3">
                <div class="ribbon-slider-track"></div>
            </div>
            <span class="FCL-label FCL-tele">T</span>
            <span class="FCL-label FCL-wide">W</span>
            <div class="slider-v-reset"></div>
            <div class="slider-label">FCL</div>
        </div>
        <div class="vertical-slider-wrap v2">
            <div class="ribbon-slider vertical" id="neumorphic-slider-vertical-2">
                <div class="ribbon-slider-track"></div>
            </div>
            <span class="iris-icon iris-closed">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="14.31" y1="8" x2="20.05" y2="17.94" />
                    <line x1="9.69" y1="8" x2="21.17" y2="8" />
                    <line x1="7.38" y1="12" x2="13.12" y2="2.06" />
                    <line x1="9.69" y1="16" x2="3.95" y2="6.06" />
                    <line x1="14.31" y1="16" x2="2.83" y2="16" />
                    <line x1="16.62" y1="12" x2="10.88" y2="21.94" />
                    <circle cx="12" cy="12" r="4" fill="currentColor" stroke="none" />
                </svg>
            </span>
            <span class="iris-icon iris-open">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="14.31" y1="8" x2="20.05" y2="17.94" />
                    <line x1="9.69" y1="8" x2="21.17" y2="8" />
                    <line x1="7.38" y1="12" x2="13.12" y2="2.06" />
                    <line x1="9.69" y1="16" x2="3.95" y2="6.06" />
                    <line x1="14.31" y1="16" x2="2.83" y2="16" />
                    <line x1="16.62" y1="12" x2="10.88" y2="21.94" />
                </svg>
            </span>
            <div class="slider-v-reset"></div>
            <div class="slider-label">IRIS</div>
        </div>

        <div class="vertical-slider-wrap v3">
            <div class="ribbon-slider vertical" id="neumorphic-slider-vertical">
                <div class="ribbon-slider-track"></div>
            </div>
            <div class="slider-v-reset"></div>
            <div class="slider-label">FCS</div>
        </div>

        <!-- Inner Zone: Controls Pan X and Pan Y (The Jog) -->
        <div id="inner-puck">
            <div class="puck-arrow p-up"></div>
            <div class="puck-arrow p-down"></div>
            <div class="puck-arrow p-left"></div>
            <div class="puck-arrow p-right"></div>
            <div class="puck-slope">
                <div class="puck-center"></div>
            </div>
        </div>

        <!-- Camera Selectors -->
        <div class="console-unit">
            <div class="ribbon-slider" id="neumorphic-slider" style="margin-bottom: 16px;">
                <div class="ribbon-slider-track"></div>
            </div>
            <div class="unit-label" style="margin-top: 0; margin-bottom: 32px;">CUSTOM</div>
            <div class="button-row">
                <div class="key-wrap">
                    <div class="keycap lit-green" data-cam="A">
                        <div class="keycap-base"></div>
                        <div class="keycap-cavity">
                            <div class="keycap-glow"></div>
                            <div class="keycap-label"><span class="cam-word">CAM</span><span class="cam-num">A</span>
                            </div>
                        </div>
                        <div class="keycap-glass"></div>
                    </div>
                    <div class="key-meta active"></div>
                </div>

                <div class="key-wrap">
                    <div class="keycap" data-cam="B">
                        <div class="keycap-base"></div>
                        <div class="keycap-cavity">
                            <div class="keycap-glow"></div>
                            <div class="keycap-label"><span class="cam-word">CAM</span><span class="cam-num">B</span>
                            </div>
                        </div>
                        <div class="keycap-glass"></div>
                    </div>
                    <div class="key-meta"></div>
                </div>

                <div class="key-wrap">
                    <div class="keycap" data-cam="C">
                        <div class="keycap-base"></div>
                        <div class="keycap-cavity">
                            <div class="keycap-glow"></div>
                            <div class="keycap-label"><span class="cam-word">CAM</span><span class="cam-num">C</span>
                            </div>
                        </div>
                        <div class="keycap-glass"></div>
                    </div>
                    <div class="key-meta"></div>
                </div>

                <div class="key-wrap">
                    <div class="keycap" data-cam="D">
                        <div class="keycap-base"></div>
                        <div class="keycap-cavity">
                            <div class="keycap-glow"></div>
                            <div class="keycap-label"><span class="cam-word">CAM</span><span class="cam-num">D</span>
                            </div>
                        </div>
                        <div class="keycap-glass"></div>
                    </div>
                    <div class="key-meta"></div>
                </div>
            </div>
            <div class="unit-label" style="margin-top: 24px; margin-bottom: 0;">CAM SELECT</div>
        </div>
    </main>

    <!-- OSC Output Log -->
    <div class="osc-log-panel collapsed" id="osc-log">
        <div class="log-header" id="log-toggle">
            <span class="log-title">CONSOLE LOG :</span>
            <span class="log-icon">▼</span>
        </div>
        <div class="log-content" id="log-content"></div>
    </div>
</body>

</html>
