<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camera Control Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/main.js"></script>
</head>
<body class="app-body">

    <!-- Header Removed -->
    <!-- Main Interaction Area -->
    <main id="space-container">
        
        <!-- OLED Display -->
        <div class="oled-display">
            <div class="oled-label" id="oled-label">CAM.DECK</div>
            <div class="oled-value" id="oled-value">IDLE</div>
        </div>

        <!-- Rotary Knobs -->
        <div class="knob-rack">
            <div class="knob-wrap" id="knob-1">
                <div class="knob-track"></div>
                <div class="knob-base">
                    <div class="knob-dial">
                        <div class="knob-indicator"></div>
                    </div>
                </div>
                <div class="knob-label">ISO</div>
            </div>
            <div class="knob-wrap" id="knob-2">
                <div class="knob-track"></div>
                <div class="knob-base">
                    <div class="knob-dial">
                        <div class="knob-indicator"></div>
                    </div>
                </div>
                <div class="knob-label">SHUTTER</div>
            </div>
            <div class="knob-wrap" id="knob-3">
                <div class="knob-track"></div>
                <div class="knob-base">
                    <div class="knob-dial">
                        <div class="knob-indicator"></div>
                    </div>
                </div>
                <div class="knob-label">WB</div>
            </div>
        </div>

        <!-- Outermost Rotary Ring: Controls Yaw -->
        <div id="yaw-ring"></div>

        <!-- Outer Zone: Controls Heave Z and Roll -->
        <div id="outer-ring">
            <div class="ring-indicator" id="outer-indicator"></div>
        </div>
        
        <!-- Pan Limit Boundary -->
        <div id="pan-boundary"></div>
        
        <!-- Reset Button -->
        <div id="reset-btn" class="reset-wrap" title="Reset Camera">
            <div class="reset-inner">
                <svg class="reset-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
            </div>
        </div>
        
        <!-- Vertical Sliders (Right Side) -->
        <div class="vertical-slider-wrap v1">
            <div class="ribbon-slider vertical" id="neumorphic-slider-vertical">
                <div class="ribbon-slider-track"></div>
            </div>
            <div class="slider-label">FOCUS</div>
        </div>
        <div class="vertical-slider-wrap v2">
            <div class="ribbon-slider vertical" id="neumorphic-slider-vertical-2">
                <div class="ribbon-slider-track"></div>
            </div>
            <div class="slider-label">IRIS</div>
        </div>
        <div class="vertical-slider-wrap v3">
            <div class="ribbon-slider vertical" id="neumorphic-slider-vertical-3">
                <div class="ribbon-slider-track"></div>
            </div>
            <div class="slider-label">ZOOM</div>
        </div>

        <!-- Inner Zone: Controls Pan X and Pan Y (The Jog) -->
        <div id="inner-puck">
            <div class="puck-arrow p-up"></div>
            <div class="puck-arrow p-down"></div>
            <div class="puck-arrow p-left"></div>
            <div class="puck-arrow p-right"></div>
            <div class="puck-slope">
                <div class="puck-center"></div>
            </div>
        </div>

        <!-- Camera Selectors -->
        <div class="console-unit">
            <div class="ribbon-slider" id="neumorphic-slider">
                <div class="ribbon-slider-track"></div>
            </div>
            <div class="unit-label">Camera Selector</div>
            <div class="button-row">
                <div class="key-wrap">
                    <div class="keycap lit-green" data-cam="A">
                        <div class="keycap-base"></div>
                        <div class="keycap-cavity">
                            <div class="keycap-glow"></div>
                            <div class="keycap-label"><span class="cam-word">CAM</span><span class="cam-num">A</span></div>
                        </div>
                        <div class="keycap-glass"></div>
                    </div>
                    <div class="key-meta active"></div>
                </div>

                <div class="key-wrap">
                    <div class="keycap" data-cam="B">
                        <div class="keycap-base"></div>
                        <div class="keycap-cavity">
                            <div class="keycap-glow"></div>
                            <div class="keycap-label"><span class="cam-word">CAM</span><span class="cam-num">B</span></div>
                        </div>
                        <div class="keycap-glass"></div>
                    </div>
                    <div class="key-meta"></div>
                </div>

                <div class="key-wrap">
                    <div class="keycap" data-cam="C">
                        <div class="keycap-base"></div>
                        <div class="keycap-cavity">
                            <div class="keycap-glow"></div>
                            <div class="keycap-label"><span class="cam-word">CAM</span><span class="cam-num">C</span></div>
                        </div>
                        <div class="keycap-glass"></div>
                    </div>
                    <div class="key-meta"></div>
                </div>

                <div class="key-wrap">
                    <div class="keycap" data-cam="D">
                        <div class="keycap-base"></div>
                        <div class="keycap-cavity">
                            <div class="keycap-glow"></div>
                            <div class="keycap-label"><span class="cam-word">CAM</span><span class="cam-num">D</span></div>
                        </div>
                        <div class="keycap-glass"></div>
                    </div>
                    <div class="key-meta"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- OSC Output Log -->
    <div class="osc-log-panel collapsed" id="osc-log">
        <div class="log-header" id="log-toggle">
            <span class="log-title">CONSOLE LOG</span>
            <span class="log-icon">▼</span>
        </div>
        <div class="log-content" id="log-content"></div>
    </div>
</body>
</html>
